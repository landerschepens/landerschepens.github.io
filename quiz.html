<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz · Fina Special</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#0f0f0f;--surface:#181818;--card:#1e1e1e;--border:#2a2a2a;--gold:#e8c547;--text:#f0f0f0;--muted:#888;--dim:#444;--green:#4caf76;--red:#e05555}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:58px;background:rgba(15,15,15,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.14em;color:var(--gold);text-decoration:none}
  .nav-links{display:flex;gap:.3rem;list-style:none}
  .nav-links a{display:flex;align-items:center;gap:.35rem;padding:.35rem .9rem;border-radius:4px;border:1px solid transparent;text-decoration:none;font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);transition:color .2s,border-color .2s,background .2s}
  .nav-links a:hover,.nav-links a.active{color:var(--gold);border-color:rgba(232,197,71,.3);background:rgba(232,197,71,.06)}

  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:5rem 1.5rem 3rem;position:relative;overflow:hidden}
  .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(232,197,71,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,197,71,.04) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,black 5%,transparent 70%);pointer-events:none}

  .screen{display:none;width:100%;max-width:700px}
  .screen.active{display:flex;flex-direction:column;align-items:center;animation:fadeUp .4s ease both}

  /* NICKNAME */
  #screen-nick{text-align:center}
  .nick-eyebrow{font-size:.68rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(232,197,71,.25);padding:.25rem .9rem;border-radius:99px;margin-bottom:1.8rem}
  .nick-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,6rem);line-height:.9;letter-spacing:.04em;margin-bottom:.8rem}
  .nick-title span{color:var(--gold)}
  .nick-desc{font-size:.9rem;color:var(--muted);font-weight:300;margin-bottom:1.5rem;line-height:1.6}
  .nick-grid{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:center;margin-bottom:1.8rem;max-width:560px}
  .nick-btn{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:.45rem .9rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
  .nick-btn:hover{border-color:rgba(232,197,71,.4);color:var(--text)}
  .nick-btn.selected{background:rgba(232,197,71,.1);border-color:var(--gold);color:var(--gold)}
  .nick-meta{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
  .nick-pill{font-size:.72rem;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:.25rem .8rem;border-radius:99px}
  .btn-go{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.14em;background:var(--gold);color:#000;border:none;padding:.8rem 3.5rem;border-radius:4px;cursor:pointer;transition:transform .15s,opacity .15s;opacity:.4;pointer-events:none}
  .btn-go.ready{opacity:1;pointer-events:all}
  .btn-go.ready:hover{opacity:.88;transform:translateY(-2px)}
  .btn-go.ready:active{transform:translateY(0)}

  /* QUIZ */
  #screen-quiz{width:100%}
  .quiz-top{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:1rem}
  .theme-badge{font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);background:rgba(232,197,71,.08);border:1px solid rgba(232,197,71,.22);padding:.25rem .8rem;border-radius:99px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62%}
  .q-counter{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
  .progress-bar-wrap{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:2rem;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s ease}

  .timer-wrap{display:flex;justify-content:center;margin-bottom:1.8rem}
  .timer-ring{position:relative;width:64px;height:64px}
  .timer-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
  .timer-ring circle{fill:none;stroke-width:4}
  .timer-track{stroke:var(--border)}
  .timer-arc{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset .95s linear,stroke .3s}
  .timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--text);line-height:1}
  .timer-ring.urgent .timer-arc{stroke:var(--red)}
  .timer-ring.urgent .timer-num{color:var(--red)}

  .q-text{font-size:clamp(1.1rem,3vw,1.55rem);font-weight:500;text-align:center;line-height:1.45;margin-bottom:2rem;min-height:2.5em}
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%}
  .opt-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:1rem 1.1rem;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);transition:border-color .15s,background .15s,transform .12s;display:flex;align-items:center;gap:.75rem;line-height:1.4;width:100%}
  .opt-btn:hover:not(:disabled){border-color:rgba(232,197,71,.4);background:rgba(232,197,71,.05);transform:translateY(-1px)}
  .opt-btn:disabled{cursor:default}
  .opt-btn.correct{border-color:var(--green);background:rgba(76,175,118,.12);color:var(--green)}
  .opt-btn.wrong{border-color:var(--red);background:rgba(224,85,85,.1);color:var(--red)}
  .opt-letter{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;color:var(--dim);min-width:1.2rem;transition:color .15s;flex-shrink:0}
  .opt-btn.correct .opt-letter{color:var(--green)}
  .opt-btn.wrong .opt-letter{color:var(--red)}
  .opt-btn:hover:not(:disabled) .opt-letter{color:var(--gold)}

  /* SUBMITTING */
  #screen-submitting{text-align:center}
  .submit-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}
  .submit-text{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;color:var(--muted)}

  /* RESULT */
  #screen-result{text-align:center;width:100%}
  .result-trophy{font-size:4rem;margin-bottom:1rem;animation:pop .5s cubic-bezier(.36,.07,.19,.97) both}
  .result-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,5rem);letter-spacing:.06em;margin-bottom:.3rem}
  .result-score{font-size:1rem;color:var(--muted);margin-bottom:.6rem;font-weight:300}
  .result-name{font-size:.85rem;color:var(--gold);margin-bottom:1.8rem;font-weight:500;letter-spacing:.06em}
  .result-msg{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,4vw,2.5rem);letter-spacing:.08em;margin-bottom:2rem}
  .result-msg.gold{color:var(--gold)} .result-msg.green{color:var(--green)} .result-msg.muted{color:var(--muted)}
  .result-breakdown{width:100%;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:2rem;text-align:left}
  .rb-row{display:flex;align-items:center;padding:.75rem 1.1rem;border-bottom:1px solid var(--border);gap:.8rem}
  .rb-row:last-child{border-bottom:none}
  .rb-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--dim);min-width:1.5rem;flex-shrink:0}
  .rb-theme{font-size:.62rem;color:var(--dim);white-space:nowrap;flex-shrink:0}
  .rb-q{font-size:.8rem;color:var(--muted);flex:1;line-height:1.4}
  .rb-icon{font-size:.95rem;flex-shrink:0}
  .btn-lb{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.12em;background:var(--gold);color:#000;border:none;padding:.75rem 2.5rem;border-radius:4px;cursor:pointer;transition:transform .15s,opacity .15s;text-decoration:none;display:inline-block}
  .btn-lb:hover{opacity:.88;transform:translateY(-2px)}

  footer{text-align:center;padding:1.5rem 2rem;border-top:1px solid var(--border);color:var(--dim);font-size:.75rem;letter-spacing:.05em}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%,100%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(.9)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:520px){nav{padding:0 1.2rem}.nav-links a .txt{display:none}.options-grid{grid-template-columns:1fr}}
</style>
</head>

      document.querySelectorAll('.nick-btn').forEach(function(b){b.classList.remove('selected')});
      btn.classList.add('selected');
      nickname=name;
      bg.classList.add('ready');
    });
    nickGrid.appendChild(btn);
  });

  bg.addEventListener('click',function(){if(nickname)startQuiz()});

  function startQuiz(){
    questions=decode();
    if(!questions.length){alert('Error loading questions.');return;}
    current=0;answers=[];
    show('screen-quiz');
    renderQ();
  }

  // Timer
  var timeLeft=TIMER_SEC;
  function startTimer(){
    clearInterval(timerIv);timeLeft=TIMER_SEC;updateTimerUI();
    timerIv=setInterval(function(){timeLeft--;updateTimerUI();if(timeLeft<=0){clearInterval(timerIv);timeExpired();}},1000);
  }
  function stopTimer(){clearInterval(timerIv)}
  function updateTimerUI(){
    var arc=$('timer-arc'),num=$('timer-num'),ring=$('timer-ring');
    arc.style.strokeDashoffset=CIRC*(1-timeLeft/TIMER_SEC);
    num.textContent=timeLeft;
    if(timeLeft<=10)ring.classList.add('urgent');else ring.classList.remove('urgent');
  }
  function timeExpired(){
    var q=questions[current];
    var btns=$('options-grid').querySelectorAll('.opt-btn');
    btns.forEach(function(b){b.disabled=true});
    btns[q.a].classList.add('correct');
    answers.push({correct:false,chosen:-1});
    setTimeout(function(){current++;if(current<questions.length)renderQ();else submitResult();},900);
  }

  function renderQ(){
    var q=questions[current],total=questions.length;
    $('progress-fill').style.width=((current/total)*100)+'%';
    $('q-counter').textContent=(current+1)+' / '+total;
    $('theme-badge').textContent=q.theme;
    var qt=$('q-text');qt.style.animation='none';void qt.offsetWidth;qt.style.animation='fadeUp .35s ease both';qt.textContent=q.q;
    var grid=$('options-grid');grid.style.animation='none';void grid.offsetWidth;grid.style.animation='fadeUp .35s .05s ease both';grid.innerHTML='';
    q.o.forEach(function(opt,i){
      var btn=document.createElement('button');btn.className='opt-btn';
      var ltr=document.createElement('span');ltr.className='opt-letter';ltr.textContent=LTRS[i];
      btn.appendChild(ltr);btn.appendChild(document.createTextNode(opt));
      btn.addEventListener('click',function(){handleAnswer(i)});
      grid.appendChild(btn);
    });
    startTimer();
  }

  function handleAnswer(chosen){
    stopTimer();
    var q=questions[current];
    var btns=$('options-grid').querySelectorAll('.opt-btn');
    btns.forEach(function(b){b.disabled=true});
    btns[q.a].classList.add('correct');
    if(chosen!==q.a)btns[chosen].classList.add('wrong');
    answers.push({correct:chosen===q.a,chosen:chosen});
    setTimeout(function(){current++;if(current<questions.length)renderQ();else submitResult();},900);
  }

  // Submit to Airtable — 0.5 pts per correct answer
  function submitResult(){
    stopTimer();
    var correct=answers.filter(function(a){return a.correct}).length;
    var total=questions.length;
    var pts=correct*0.5;
    show('screen-submitting');
    fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+AT_TABLE,{
      method:'POST',
      headers:{'Authorization':'Bearer '+AT_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({fields:{Name:nickname,Quiz:pts,Timestamp:new Date().toISOString()}})
    })
    .then(function(){showResult(correct,total,pts)})
    .catch(function(){showResult(correct,total,pts)});
  }

  function showResult(correct,total,pts){
    var pct=correct/total;
    var trophy,title,msgClass,msg;
    if(pct===1)      {trophy='🏆';title='Perfecte score!'; msgClass='gold'; msg='Onverslaanbaar!'}
    else if(pct>=.7) {trophy='🥇';title=correct+' / '+total; msgClass='gold'; msg='Uitstekend!'}
    else if(pct>=.5) {trophy='🥈';title=correct+' / '+total; msgClass='green';msg='Goed gedaan!'}
    else             {trophy='💡';title=correct+' / '+total; msgClass='muted';msg='Beter luck next time!'}
    $('result-trophy').textContent=trophy;
    $('result-title').textContent=title;
    $('result-score').textContent='Je had '+correct+' / '+total+' correct — +'+pts.toFixed(1)+' punten!';
    $('result-name').textContent='Gespeeld door: '+nickname;
    $('result-msg').textContent=msg;
    $('result-msg').className='result-msg '+msgClass;
    var bd=$('result-breakdown');bd.innerHTML='';
    questions.forEach(function(q,i){
      var row=document.createElement('div');row.className='rb-row';
      var num=document.createElement('span');num.className='rb-num';num.textContent=i+1;
      var th=document.createElement('span');th.className='rb-theme';th.textContent=q.theme;
      var qq=document.createElement('span');qq.className='rb-q';qq.textContent=q.q;
      var ic=document.createElement('span');ic.className='rb-icon';ic.textContent=answers[i].correct?'✅':'❌';
      row.appendChild(num);row.appendChild(th);row.appendChild(qq);row.appendChild(ic);
      bd.appendChild(row);
    });
    show('screen-result');
  }

  show('screen-nick');
