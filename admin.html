<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Fina Special</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#0f0f0f;--surface:#181818;--card:#1e1e1e;--border:#2a2a2a;--gold:#e8c547;--text:#f0f0f0;--muted:#888;--dim:#444;--green:#4caf76;--red:#e05555}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:58px;background:rgba(15,15,15,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.14em;color:var(--gold);text-decoration:none}
  .nav-links{display:flex;gap:.3rem;list-style:none}
  .nav-links a{display:flex;align-items:center;gap:.35rem;padding:.35rem .9rem;border-radius:4px;border:1px solid transparent;text-decoration:none;font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);transition:color .2s,border-color .2s,background .2s}
  .nav-links a:hover,.nav-links a.active{color:var(--gold);border-color:rgba(232,197,71,.3);background:rgba(232,197,71,.06)}

  .main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:5.5rem 1.5rem 3rem;position:relative;overflow:hidden}
  .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(232,197,71,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,197,71,.04) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 80% 60% at 50% 20%,black 5%,transparent 70%);pointer-events:none}

  .inner{position:relative;z-index:1;width:100%;max-width:520px}

  .page-eyebrow{font-size:.68rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(232,197,71,.25);padding:.25rem .9rem;border-radius:99px;display:inline-block;margin-bottom:1.2rem}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,9vw,5.5rem);line-height:.9;letter-spacing:.04em;margin-bottom:2rem}
  .page-title span{color:var(--gold)}

  /* FORM CARD */
  .form-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:1.5rem}
  .form-card-header{padding:1rem 1.4rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem}
  .form-card-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.08em;color:var(--text)}
  .form-card-body{padding:1.4rem}

  .field{margin-bottom:1.2rem}
  .field:last-child{margin-bottom:0}
  .field-label{font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:block}

  /* Player selector */
  .player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.4rem}
  .player-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.45rem .6rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player-btn:hover{border-color:rgba(232,197,71,.4);color:var(--text)}
  .player-btn.selected{background:rgba(232,197,71,.1);border-color:var(--gold);color:var(--gold)}

  /* Points buttons */
  .pts-row{display:flex;gap:.5rem;flex-wrap:wrap}
  .pts-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.5rem 0;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;color:var(--muted);cursor:pointer;transition:all .15s;flex:1;min-width:48px;text-align:center}
  .pts-btn:hover{border-color:rgba(232,197,71,.4);color:var(--text)}
  .pts-btn.selected{background:rgba(232,197,71,.1);border-color:var(--gold);color:var(--gold)}

  /* Custom points */
  .custom-pts-wrap{display:flex;align-items:center;gap:.5rem;margin-top:.6rem}
  .custom-pts-input{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.5rem .8rem;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;color:var(--text);outline:none;width:90px;text-align:center;transition:border-color .2s}
  .custom-pts-input:focus{border-color:rgba(232,197,71,.5)}
  .custom-pts-label{font-size:.78rem;color:var(--muted)}

  /* Reason */
  .reason-row{display:flex;gap:.4rem;flex-wrap:wrap}
  .reason-btn{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:.3rem .85rem;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
  .reason-btn:hover{border-color:var(--muted);color:var(--text)}
  .reason-btn.selected{background:rgba(232,197,71,.08);border-color:rgba(232,197,71,.4);color:var(--gold)}

  /* Submit */
  .submit-row{display:flex;gap:.8rem;align-items:center;margin-top:1.8rem}
  .btn-submit{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.12em;background:var(--gold);color:#000;border:none;padding:.75rem 2rem;border-radius:4px;cursor:pointer;transition:transform .15s,opacity .15s;flex:1}
  .btn-submit:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
  .btn-submit:disabled{opacity:.35;cursor:default;transform:none}

  /* Toast */
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.8rem 1.4rem;font-size:.88rem;font-weight:500;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.success{border-color:var(--green);color:var(--green)}
  .toast.error{border-color:var(--red);color:var(--red)}

  /* Recent log */
  .log-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .log-header{padding:.8rem 1.4rem;background:var(--surface);border-bottom:1px solid var(--border);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;color:var(--muted)}
  .log-empty{padding:1.2rem 1.4rem;font-size:.82rem;color:var(--dim)}
  .log-row{display:flex;align-items:center;gap:.8rem;padding:.7rem 1.4rem;border-bottom:1px solid var(--border);font-size:.82rem}
  .log-row:last-child{border-bottom:none}
  .log-pts{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--green);min-width:3rem}
  .log-name{font-weight:500;flex:1}
  .log-reason{color:var(--muted);font-size:.75rem}
  .log-time{color:var(--dim);font-size:.72rem;min-width:3rem;text-align:right}

  footer{text-align:center;padding:1.5rem 2rem;border-top:1px solid var(--border);color:var(--dim);font-size:.75rem;letter-spacing:.05em}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:520px){nav{padding:0 1.2rem}.nav-links a .txt{display:none}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Fina Special</a>
  <ul class="nav-links">
    <li><a href="quiz.html">🧠 <span class="txt">Quiz</span></a></li>
    <li><a href="tournament.html">🎯 <span class="txt">Toernooi</span></a></li>
    <li><a href="leaderboard.html">🏅 <span class="txt">Leaderboard</span></a></li>
    <li><a href="admin.html" class="active">⚙️ <span class="txt">Admin</span></a></li>
  </ul>
</nav>

<div class="main">
  <div class="grid-bg"></div>
  <div class="inner">

    <div class="page-eyebrow">Fina Special · Admin</div>
    <div class="page-title">Punten<br><span>toevoegen</span></div>

    <div class="form-card" style="animation:fadeUp .4s ease both">
      <div class="form-card-header">
        <span>👤</span>
        <div class="form-card-title">Selecteer speler</div>
      </div>
      <div class="form-card-body">
        <div class="player-grid" id="player-grid"></div>
      </div>
    </div>

    <div class="form-card" style="animation:fadeUp .4s .08s ease both">
      <div class="form-card-header">
        <span>🎯</span>
        <div class="form-card-title">Punten</div>
      </div>
      <div class="form-card-body">
        <div class="field">
          <label class="field-label">Snelkeuze</label>
          <div class="pts-row" id="pts-row">
            <button class="pts-btn" data-pts="1">+1</button>
            <button class="pts-btn" data-pts="2">+2</button>
            <button class="pts-btn" data-pts="3">+3</button>
            <button class="pts-btn" data-pts="5">+5</button>
            <button class="pts-btn" data-pts="10">+10</button>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Aangepast</label>
          <div class="custom-pts-wrap">
            <input class="custom-pts-input" id="custom-pts" type="number" min="0.5" max="100" step="0.5" placeholder="0"/>
            <span class="custom-pts-label">punten (kan ook 0.5, 1.5 ...)</span>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Reden</label>
          <div class="reason-row" id="reason-row">
            <button class="reason-btn" data-r="🎯 Darts gewonnen">🎯 Darts</button>
            <button class="reason-btn" data-r="🎱 Biljart gewonnen">🎱 Biljart</button>
            <button class="reason-btn" data-r="🏆 Finale">🏆 Finale</button>
            <button class="reason-btn" data-r="⭐ Bonus">⭐ Bonus</button>
            <button class="reason-btn" data-r="🎉 Andere">🎉 Andere</button>
          </div>
        </div>
      </div>
    </div>

    <div class="submit-row" style="animation:fadeUp .4s .16s ease both">
      <button class="btn-submit" id="btn-submit" disabled>GEEF PUNTEN</button>
    </div>

    <div class="log-card" style="margin-top:2rem;animation:fadeUp .4s .22s ease both">
      <div class="log-header">Recente acties</div>
      <div id="action-log"><div class="log-empty">Nog geen acties deze sessie.</div></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<footer>Fina Special &nbsp;·&nbsp; Admin &nbsp;·&nbsp; Punten beheer</footer>

<script>
var AT_BASE='appcZ6eL9mrvzI7d1';
var AT_TABLE='tbl3MM97n3v5Fithf';
var AT_TOKEN='patHtVCKSUefoV18U.305cca252c0d4874fb7fa65f23aaf24f0de5e31b3085caefdbe0d39b4a4c5ef8';

var PLAYERS=["Lander","Ben","Tim","Celestine","Vic","Sam","Maure","Stef","Joodert","Ashley",
  "Brecht","Dauwe","Femke","Florian","Floris","Lauren","Senne","Laurens","Lucas",
  "Dominique","Sven","Anse","Schele-Nele"];

var selectedPlayer=null, selectedPts=null, selectedReason=null;
var actionLog=[];

// Build player grid
var grid=document.getElementById('player-grid');
PLAYERS.forEach(function(name){
  var btn=document.createElement('button');
  btn.className='player-btn';
  btn.textContent=name;
  btn.addEventListener('click',function(){
    document.querySelectorAll('.player-btn').forEach(function(b){b.classList.remove('selected')});
    btn.classList.add('selected');
    selectedPlayer=name;
    checkReady();
  });
  grid.appendChild(btn);
});

// Points quick-select
document.querySelectorAll('.pts-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.pts-btn').forEach(function(b){b.classList.remove('selected')});
    btn.classList.add('selected');
    selectedPts=parseFloat(btn.dataset.pts);
    document.getElementById('custom-pts').value='';
    checkReady();
  });
});

// Custom points
document.getElementById('custom-pts').addEventListener('input',function(){
  document.querySelectorAll('.pts-btn').forEach(function(b){b.classList.remove('selected')});
  var v=parseFloat(this.value);
  selectedPts=isNaN(v)||v<=0?null:v;
  checkReady();
});

// Reason
document.querySelectorAll('.reason-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.reason-btn').forEach(function(b){b.classList.remove('selected')});
    btn.classList.add('selected');
    selectedReason=btn.dataset.r;
    checkReady();
  });
});

function checkReady(){
  document.getElementById('btn-submit').disabled=!(selectedPlayer&&selectedPts&&selectedReason);
}

// Toast
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(type||'success')+' show';
  setTimeout(function(){t.classList.remove('show')},2800);
}

// Add to local log
function addLog(player,pts,reason){
  var now=new Date();
  var time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  actionLog.unshift({player:player,pts:pts,reason:reason,time:time});
  var log=document.getElementById('action-log');
  log.innerHTML='';
  actionLog.slice(0,10).forEach(function(e){
    var row=document.createElement('div');row.className='log-row';
    row.innerHTML='<span class="log-pts">+'+e.pts+'</span>'
      +'<span class="log-name">'+e.player+'</span>'
      +'<span class="log-reason">'+e.reason+'</span>'
      +'<span class="log-time">'+e.time+'</span>';
    log.appendChild(row);
  });
}

// Submit — find player record and patch, or create new
document.getElementById('btn-submit').addEventListener('click',function(){
  var btn=this;
  btn.disabled=true;
  btn.textContent='Bezig...';

  // First look up existing record for this player
  fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+AT_TABLE
    +'?filterByFormula='+encodeURIComponent('{Name}="'+selectedPlayer+'"')
    +'&maxRecords=1',
    {headers:{'Authorization':'Bearer '+AT_TOKEN}}
  )
  .then(function(r){return r.json()})
  .then(function(data){
    var records=data.records||[];
    if(records.length>0){
      // Player exists — add points to existing score
      var rec=records[0];
      var oldScore=parseFloat(rec.fields.Score)||0;
      var newScore=Math.round((oldScore+selectedPts)*10)/10;
      return fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+AT_TABLE+'/'+rec.id,{
        method:'PATCH',
        headers:{'Authorization':'Bearer '+AT_TOKEN,'Content-Type':'application/json'},
        body:JSON.stringify({fields:{Score:newScore,Timestamp:new Date().toISOString()}})
      });
    } else {
      // Player not found — create new record
      return fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+AT_TABLE,{
        method:'POST',
        headers:{'Authorization':'Bearer '+AT_TOKEN,'Content-Type':'application/json'},
        body:JSON.stringify({fields:{Name:selectedPlayer,Score:selectedPts,Timestamp:new Date().toISOString()}})
      });
    }
  })
  .then(function(r){return r.json()})
  .then(function(data){
    if(data.error){
      toast('Fout: '+data.error.message,'error');
    } else {
      var newScore=parseFloat(data.fields.Score)||0;
      toast('✅ +'+selectedPts+' pt voor '+selectedPlayer+' (totaal: '+newScore.toFixed(1)+')','success');
      addLog(selectedPlayer,selectedPts,selectedReason);
      // Reset selection
      document.querySelectorAll('.player-btn').forEach(function(b){b.classList.remove('selected')});
      document.querySelectorAll('.pts-btn').forEach(function(b){b.classList.remove('selected')});
      document.querySelectorAll('.reason-btn').forEach(function(b){b.classList.remove('selected')});
      document.getElementById('custom-pts').value='';
      selectedPlayer=null; selectedPts=null; selectedReason=null;
    }
    btn.textContent='GEEF PUNTEN';
    checkReady();
  })
  .catch(function(e){
    toast('Verbindingsfout: '+e.message,'error');
    btn.textContent='GEEF PUNTEN';
    btn.disabled=false;
  });
});
</script>
</body>
</html>
